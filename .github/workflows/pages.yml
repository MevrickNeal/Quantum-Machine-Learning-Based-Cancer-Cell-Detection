name: Sync frontend → docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync frontend/ to docs/
        run: |
          rsync -av --delete \
            --exclude='.gitkeep' \
            frontend/ docs/
          # Always keep CNAME
          echo "leukoq.pro.bd" > docs/CNAME

      - name: Commit updated docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: sync docs/ from frontend/ [skip ci]"
          git push
